<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discover Taiwan — Travel Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#B5311A;--red-light:#FDECEA;--red-mid:#D94F33;
  --ink:#1A1A1A;--muted:#6B6B6B;--hint:#A0A0A0;
  --bg:#FAFAF8;--card:#FFFFFF;--surface:#F3F1EE;
  --border:#E5E2DC;--border-strong:#C8C4BC;
  --green:#1B5E20;--green-light:#E8F5E9;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --shadow-hover:0 8px 28px rgba(0,0,0,0.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

header{background:#1A1A1A;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(181,49,26,0.06) 40px,rgba(181,49,26,0.06) 80px)}
.header-inner{position:relative;z-index:1}
.header-eyebrow{display:inline-block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red-mid);border:1px solid var(--red-mid);padding:4px 14px;border-radius:20px;margin-bottom:14px;font-weight:500}
header h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,46px);font-weight:700;color:#fff;line-height:1.1;margin-bottom:8px}
header h1 span{color:var(--red-mid)}
header p{font-size:14px;color:#A0A0A0;font-weight:300}

.controls-wrap{background:#fff;border-bottom:1px solid var(--border);padding:1rem 1.5rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.controls-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;height:42px}
.search-wrap svg{width:16px;height:16px;stroke:var(--hint);flex-shrink:0}
.search-wrap input{border:none;background:transparent;outline:none;font-size:14px;color:var(--ink);flex:1;font-family:'DM Sans',sans-serif;width:100%}
.search-wrap input::placeholder{color:var(--hint)}
.filter-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-chips{display:flex;gap:6px;flex-wrap:nowrap;padding-bottom:2px}
.chip{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.active{background:var(--red);color:#fff;border-color:var(--red);font-weight:500}

.sort-bar{max-width:1200px;margin:1.25rem auto 1rem;padding:0 1.5rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sort-label{font-size:11px;color:var(--hint);font-weight:500;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.sort-btns{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1}
.sort-btns::-webkit-scrollbar{display:none}
.sort-btn{font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.sort-btn:hover{color:var(--ink);border-color:var(--border-strong)}
.sort-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:500}
.sort-btn svg{width:13px;height:13px}
.results-info{font-size:12px;color:var(--hint);white-space:nowrap}

.content-wrap{max-width:1200px;margin:0 auto;padding:0 1.5rem 3rem}
.metro-group-title{display:flex;align-items:center;gap:10px;margin:2rem 0 1rem;padding-bottom:10px;border-bottom:2px solid var(--border)}
.metro-dot{width:14px;height:14px;border-radius:50%;background:var(--red);flex-shrink:0}
.metro-group-title h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--ink)}
.metro-group-title span{font-size:12px;color:var(--muted);margin-left:auto}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
@media(max-width:640px){.cards-grid{grid-template-columns:1fr}}
@media(min-width:641px) and (max-width:1024px){.cards-grid{grid-template-columns:repeat(2,1fr)}}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;box-shadow:var(--shadow)}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}

/* CAROUSEL */
.carousel{position:relative;height:190px;background:var(--surface);overflow:hidden;user-select:none}
@media(max-width:640px){.carousel{height:220px}}
.carousel-track{display:flex;height:100%;transition:transform 0.3s ease;will-change:transform}
.carousel-slide{min-width:100%;height:100%;flex-shrink:0;position:relative;overflow:hidden}
.carousel-slide img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  cursor:zoom-in;
  transform-origin:var(--ox,50%) var(--oy,50%);
  transform:scale(var(--zoom,1));
}
.carousel-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;background:linear-gradient(135deg,var(--surface),#E8E4DE)}
.cat-badge{position:absolute;top:10px;left:10px;background:rgba(26,26,26,0.7);backdrop-filter:blur(4px);color:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:12px;font-weight:500;pointer-events:none;z-index:3}
.free-badge{position:absolute;top:10px;right:10px;background:#1B5E20;color:#fff;font-size:10px;padding:3px 10px;border-radius:12px;font-weight:500;pointer-events:none;z-index:3}

.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;z-index:4;padding:0}
.carousel:hover .carousel-btn{opacity:1}
@media(max-width:640px){.carousel-btn{opacity:0.75;width:28px;height:28px}}
.carousel-btn svg{width:14px;height:14px;stroke:#1A1A1A;stroke-width:2.5}
.carousel-btn.prev{left:8px}
.carousel-btn.next{right:8px}
.carousel-btn:disabled{opacity:0.15!important;cursor:default}
.carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:4}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);transition:all 0.2s;cursor:pointer}
.dot.active{background:#fff;width:16px;border-radius:3px}

/* CARD BODY */
.card-body{padding:14px 16px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--ink);margin-bottom:2px}
.card-name-zh{font-size:12px;color:var(--hint);margin-bottom:12px}
.meta-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.meta-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--muted)}
.meta-icon{width:15px;height:15px;stroke:var(--red);flex-shrink:0;margin-top:1px}
.metro-line-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;margin-right:4px;margin-bottom:4px}
.line-red{background:#e53935;color:#fff}
.line-green{background:#43a047;color:#fff}
.line-orange{background:#fb8c00;color:#fff}
.line-blue{background:#1e88e5;color:#fff}
.line-brown{background:#6d4c41;color:#fff}
.line-yellow{background:#fdd835;color:#1A1A1A}
.line-purple{background:#8e24aa;color:#fff}
.line-pink{background:#e91e63;color:#fff}
.line-default{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.transfer-row{margin-top:4px;font-size:12px;color:var(--muted);display:flex;align-items:flex-start;gap:6px}
.transfer-icon{width:13px;height:13px;stroke:var(--hint);flex-shrink:0;margin-top:1px}
.nearby-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.nearby-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.card-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;gap:8px}
.price-tag{font-size:13px;font-weight:500;background:var(--red-light);color:var(--red);padding:4px 10px;border-radius:8px;white-space:nowrap}
.price-tag.free{background:var(--green-light);color:var(--green)}
.map-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--red);border:1px solid var(--red);padding:5px 12px;border-radius:var(--radius-sm);text-decoration:none;font-weight:500;transition:all 0.15s;white-space:nowrap}
.map-link:hover{background:var(--red);color:#fff}
.map-link svg{width:13px;height:13px;stroke:currentColor}

/* LIGHTBOX */
#lightbox{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.92);
  align-items:center;justify-content:center;
}
#lightbox.open{display:flex}
#lightbox-img{
  max-width:92vw;max-height:88vh;
  object-fit:contain;border-radius:4px;
  display:block;
}
#lightbox-close{
  position:fixed;top:16px;right:16px;
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:1.5px solid rgba(255,255,255,0.3);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;line-height:1;
  transition:background 0.15s;z-index:1001;
}
#lightbox-close:hover{background:rgba(255,255,255,0.28)}
#lightbox-prev,#lightbox-next{
  position:fixed;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:1.5px solid rgba(255,255,255,0.3);
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;z-index:1001;
}
#lightbox-prev:hover,#lightbox-next:hover{background:rgba(255,255,255,0.28)}
#lightbox-prev{left:16px}
#lightbox-next{right:16px}
#lightbox-prev svg,#lightbox-next svg{width:20px;height:20px;stroke:#fff;stroke-width:2.5}
#lightbox-counter{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.6);font-size:13px;
  font-family:'DM Sans',sans-serif;
}
#lightbox-prev:disabled,#lightbox-next:disabled{opacity:0.2;cursor:default}

.state-box{text-align:center;padding:4rem 1rem;color:var(--hint);grid-column:1/-1}
.state-box svg{width:40px;height:40px;stroke:var(--border);display:block;margin:0 auto 12px}
footer{text-align:center;padding:2rem 1rem;font-size:12px;color:var(--hint);border-top:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">Taiwan Travel Guide</div>
    <h1>Discover <span>Taiwan</span></h1>
    <p>Curated destinations — temples, nature, night markets & more</p>
  </div>
</header>

<div class="controls-wrap">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search places, stations, districts…" oninput="render()"/>
    </div>
    <div class="filter-scroll">
      <div class="filter-chips">
        <button class="chip active" data-cat="all" onclick="setFilter('all')">All</button>
        <button class="chip" data-cat="landmark" onclick="setFilter('landmark')">🏙️ Landmark</button>
        <button class="chip" data-cat="temple" onclick="setFilter('temple')">⛩️ Temple</button>
        <button class="chip" data-cat="museum" onclick="setFilter('museum')">🏛️ Museum</button>
        <button class="chip" data-cat="nature" onclick="setFilter('nature')">🌿 Nature</button>
        <button class="chip" data-cat="beach" onclick="setFilter('beach')">🌊 Beach & Lake</button>
        <button class="chip" data-cat="nightmarket" onclick="setFilter('nightmarket')">🍢 Night Market</button>
        <button class="chip" data-cat="food" onclick="setFilter('food')">🍜 Food & Dining</button>
        <button class="chip" data-cat="shopping" onclick="setFilter('shopping')">🛍️ Shopping</button>
        <button class="chip" data-cat="historic" onclick="setFilter('historic')">🏘️ Historic District</button>
        <button class="chip" data-cat="entertainment" onclick="setFilter('entertainment')">🎡 Entertainment</button>
      </div>
    </div>
  </div>
</div>

<div class="sort-bar">
  <span class="sort-label">Group by</span>
  <div class="sort-btns">
    <button class="sort-btn active" id="sort-metro" onclick="setSort('metro')">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10v4M10 10v4M14 10v4M18 10v4"/></svg>Metro Station
    </button>
    <button class="sort-btn" id="sort-name" onclick="setSort('name')">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h8"/></svg>Name (A–Z)
    </button>
    <button class="sort-btn" id="sort-district" onclick="setSort('district')">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>District
    </button>
  </div>
  <span class="results-info" id="resultsInfo"></span>
</div>

<div class="content-wrap" id="mainContent"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="lbBackdropClick(event)">
  <button id="lightbox-close" onclick="closeLightbox()" aria-label="Close">✕</button>
  <button id="lightbox-prev" onclick="lbPrev()" aria-label="Previous">
    <svg fill="none" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <img id="lightbox-img" src="" alt=""/>
  <button id="lightbox-next" onclick="lbNext()" aria-label="Next">
    <svg fill="none" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
  </button>
  <div id="lightbox-counter"></div>
</div>

<footer>© Taiwan Travel Guide · <a href="admin.html" style="color:var(--hint)">Admin</a></footer>

<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app=initializeApp(FIREBASE_CONFIG);
const db=getDatabase(app);
let allPlaces=[],currentFilter='all',currentSort='metro';

// lightbox state
let lbPhotos=[],lbIndex=0;

const LINE_COLORS={'red':'line-red','green':'line-green','orange':'line-orange','blue':'line-blue','brown':'line-brown','yellow':'line-yellow','purple':'line-purple','pink':'line-pink'};
function lineClass(line=''){const l=line.toLowerCase();for(const k of Object.keys(LINE_COLORS))if(l.includes(k))return LINE_COLORS[k];return 'line-default';}

window.setFilter=function(cat){currentFilter=cat;document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));render();};
window.setSort=function(s){currentSort=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.id==='sort-'+s));render();};

window.render=function(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=allPlaces.filter(p=>{
    const matchCat=currentFilter==='all'||p.category===currentFilter;
    const matchQ=!q||[p.name,p.nameZh,p.district,p.metroStation,p.metroLine,p.desc].some(f=>f&&f.toLowerCase().includes(q));
    return matchCat&&matchQ;
  });
  document.getElementById('resultsInfo').textContent=list.length+' place'+(list.length!==1?'s':'')+' found';
  const wrap=document.getElementById('mainContent');
  if(!list.length){wrap.innerHTML='<div class="cards-grid"><div class="state-box"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No places found.</p></div></div>';return;}
  if(currentSort==='metro') renderGrouped(list,'metroStation',wrap);
  else if(currentSort==='district') renderGrouped(list,'district',wrap);
  else{list.sort((a,b)=>a.name.localeCompare(b.name));wrap.innerHTML='<div class="cards-grid">'+list.map(cardHTML).join('')+'</div>';}
  initCarousels();
};

function renderGrouped(list,key,wrap){
  const groups={};
  list.forEach(p=>{const k=p[key]||'Other';if(!groups[k])groups[k]=[];groups[k].push(p);});
  wrap.innerHTML=Object.keys(groups).sort().map(g=>`
    <div>
      <div class="metro-group-title">
        <div class="metro-dot"></div><h2>${esc(g)}</h2>
        <span>${groups[g].length} place${groups[g].length!==1?'s':''}</span>
      </div>
      <div class="cards-grid">${groups[g].map(cardHTML).join('')}</div>
    </div>`).join('');
}

function cardHTML(p){
  const photos=Array.isArray(p.photos)&&p.photos.length?p.photos:[];
  const photoMeta=Array.isArray(p.photoMeta)?p.photoMeta:[];
  const isFree=!p.price||p.price==0;
  const catLabel=(p.category||'').replace('nightmarket','Night Market').replace('historic','Historic District');

  // slides — apply zoom + position from photoMeta
  let slidesHTML='';
  if(photos.length){
    slidesHTML=photos.map((url,i)=>{
      const m=photoMeta[i]||{};
      const zoom=Math.min(2.0,Math.max(0.5,parseFloat(m.zoom)||1));
      const ox=parseFloat(m.x)||50;
      const oy=parseFloat(m.y)||50;
      return `<div class="carousel-slide">
        <img src="${esc(url)}" alt="${esc(p.name)}" loading="lazy"
          style="--zoom:${zoom};--ox:${ox}%;--oy:${oy}%"
          onclick="openLightbox(${JSON.stringify(photos).replace(/"/g,'&quot;')},${i})"
          data-zoom="${zoom}"/>
      </div>`;
    }).join('');
  } else {
    slidesHTML=`<div class="carousel-slide"><div class="carousel-placeholder">${p.emoji||'📍'}</div></div>`;
  }

  const dotsHTML=photos.length>1?`<div class="carousel-dots">${photos.map((_,i)=>`<div class="dot${i===0?' active':''}" onclick="goSlide(this,${i})"></div>`).join('')}</div>`:'';
  const btnsHTML=photos.length>1?`
    <button class="carousel-btn prev" onclick="prevSlide(this)" aria-label="Previous"><svg fill="none" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
    <button class="carousel-btn next" onclick="nextSlide(this)" aria-label="Next"><svg fill="none" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>`:'';

  const lineBadge=p.metroLine?`<span class="metro-line-badge ${lineClass(p.metroLine)}">${esc(p.metroLine)}</span>`:'';
  const walkText=p.walkTime?` · ${esc(p.walkTime)}`:'';
  const metroText=`${lineBadge}<span>${esc(p.metroStation||'')}${walkText}</span>`;
  const transferHTML=p.transferType?`<div class="transfer-row"><svg class="transfer-icon" fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M9 12h6m-3-3v6"/><circle cx="12" cy="12" r="10"/></svg><span>${esc(p.transferType)}${p.transferDetail?' — '+esc(p.transferDetail):''}${p.transferTime?' ('+esc(p.transferTime)+')':''}</span></div>`:'';
  const nearbyHTML=(p.nearby||[]).map(n=>`<span class="nearby-tag">${esc(n)}</span>`).join('');

  return `<div class="card">
    <div class="carousel" data-index="0">
      <div class="carousel-track">${slidesHTML}</div>
      ${btnsHTML}${dotsHTML}
      <span class="cat-badge">${esc(catLabel)}</span>
      ${isFree?'<span class="free-badge">Free</span>':''}
    </div>
    <div class="card-body">
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-name-zh">${esc(p.nameZh||'')}${p.district?' · '+esc(p.district):''}</div>
      <div class="meta-list">
        <div class="meta-row">
          <svg class="meta-icon" fill="none" viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10v4M10 10v4M14 10v4M18 10v4"/></svg>
          <div style="flex:1">${metroText}${transferHTML}</div>
        </div>
        ${nearbyHTML?`<div class="meta-row">
          <svg class="meta-icon" fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          <div style="flex:1"><div style="margin-bottom:4px;font-size:12px">Nearby</div><div class="nearby-wrap">${nearbyHTML}</div></div>
        </div>`:''}
      </div>
      ${p.desc?`<div class="card-desc">${esc(p.desc)}</div>`:''}
      <div class="card-footer">
        <span class="price-tag ${isFree?'free':''}">${isFree?'Free entry':'NT$'+p.price}</span>
        ${p.mapUrl?`<a href="${esc(p.mapUrl)}" target="_blank" rel="noopener" class="map-link"><svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Google Maps</a>`:''}
      </div>
    </div>
  </div>`;
}

// CAROUSEL
function initCarousels(){
  document.querySelectorAll('.carousel').forEach(c=>{
    let startX=0,isDragging=false;
    c.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;isDragging=true;},{passive:true});
    c.addEventListener('touchend',e=>{
      if(!isDragging)return;isDragging=false;
      const dx=e.changedTouches[0].clientX-startX;
      if(Math.abs(dx)>40){dx<0?nextSlide(c.querySelector('.next')):prevSlide(c.querySelector('.prev'));}
    },{passive:true});
  });
}
function setSlide(c,idx){
  const slides=c.querySelectorAll('.carousel-slide');
  const total=slides.length;if(!total)return;
  idx=Math.max(0,Math.min(idx,total-1));
  c.dataset.index=idx;
  c.querySelector('.carousel-track').style.transform=`translateX(-${idx*100}%)`;
  c.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  const prev=c.querySelector('.prev'),next=c.querySelector('.next');
  if(prev)prev.disabled=idx===0;
  if(next)next.disabled=idx===total-1;
}
window.goSlide=function(dotEl,idx){setSlide(dotEl.closest('.carousel'),idx);};
window.prevSlide=function(btn){if(!btn)return;const c=btn.closest('.carousel');setSlide(c,+c.dataset.index-1);};
window.nextSlide=function(btn){if(!btn)return;const c=btn.closest('.carousel');setSlide(c,+c.dataset.index+1);};

// LIGHTBOX
window.openLightbox=function(photos,idx){
  lbPhotos=photos;lbIndex=idx;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
};
function renderLightbox(){
  document.getElementById('lightbox-img').src=lbPhotos[lbIndex];
  document.getElementById('lightbox-counter').textContent=lbPhotos.length>1?`${lbIndex+1} / ${lbPhotos.length}`:'';
  document.getElementById('lightbox-prev').disabled=lbIndex===0;
  document.getElementById('lightbox-next').disabled=lbIndex===lbPhotos.length-1;
  document.getElementById('lightbox-prev').style.display=lbPhotos.length>1?'flex':'none';
  document.getElementById('lightbox-next').style.display=lbPhotos.length>1?'flex':'none';
}
window.closeLightbox=function(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
};
window.lbPrev=function(){if(lbIndex>0){lbIndex--;renderLightbox();}};
window.lbNext=function(){if(lbIndex<lbPhotos.length-1){lbIndex++;renderLightbox();}};
window.lbBackdropClick=function(e){if(e.target===document.getElementById('lightbox'))closeLightbox();};
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft')lbPrev();
  if(e.key==='ArrowRight')lbNext();
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

onValue(ref(db,'places'),snap=>{
  const data=snap.val();
  allPlaces=data?Object.entries(data).map(([id,v])=>({id,...v})):[];
  render();
},err=>{
  document.getElementById('mainContent').innerHTML=`<div class="state-box"><p style="color:var(--red)">Unable to load data.<br><small>${err.message}</small></p></div>`;
});
</script>
