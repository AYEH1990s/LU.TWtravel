<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Discover Taiwan — Travel Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#B5311A;--red-light:#FDECEA;--red-mid:#D94F33;
  --gold:#C8960C;--gold-light:#FDF6E3;
  --ink:#1A1A1A;--muted:#6B6B6B;--hint:#A0A0A0;
  --bg:#FAFAF8;--card:#FFFFFF;--surface:#F3F1EE;
  --border:#E5E2DC;--border-strong:#C8C4BC;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --shadow-hover:0 8px 28px rgba(0,0,0,0.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── HEADER ── */
header{
  background:#1A1A1A;
  padding:2.5rem 2rem 2rem;
  text-align:center;
  position:relative;
  overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(181,49,26,0.06) 40px,rgba(181,49,26,0.06) 80px);
}
.header-inner{position:relative;z-index:1}
.header-eyebrow{
  display:inline-block;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--red-mid);border:1px solid var(--red-mid);
  padding:4px 14px;border-radius:20px;margin-bottom:14px;
  font-weight:500;
}
header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,46px);font-weight:700;
  color:#FFFFFF;line-height:1.1;margin-bottom:8px;
  letter-spacing:-0.5px;
}
header h1 span{color:var(--red-mid)}
header p{font-size:15px;color:#A0A0A0;font-weight:300}

/* ── CONTROLS ── */
.controls-wrap{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:1.25rem 2rem;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;max-width:1200px;margin:0 auto}
.search-wrap{
  flex:1;min-width:200px;
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0 14px;height:40px;
}
.search-wrap svg{width:16px;height:16px;stroke:var(--hint);flex-shrink:0}
.search-wrap input{
  border:none;background:transparent;outline:none;
  font-size:14px;color:var(--ink);flex:1;
  font-family:'DM Sans',sans-serif;
}
.search-wrap input::placeholder{color:var(--hint)}

.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{
  font-size:12px;padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.15s;white-space:nowrap;font-weight:400;
}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.active{background:var(--red);color:#fff;border-color:var(--red);font-weight:500}

/* ── SORT BAR ── */
.sort-bar{
  max-width:1200px;margin:1.5rem auto 1rem;
  padding:0 2rem;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.sort-label{font-size:12px;color:var(--hint);font-weight:500;text-transform:uppercase;letter-spacing:1px}
.sort-btn{
  font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--card);color:var(--muted);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;gap:5px;transition:all 0.15s;
}
.sort-btn:hover{color:var(--ink);border-color:var(--border-strong)}
.sort-btn.active{color:var(--ink);border-color:var(--ink);font-weight:500;background:var(--ink);color:#fff}
.sort-btn svg{width:13px;height:13px}
.results-info{margin-left:auto;font-size:12px;color:var(--hint)}

/* ── METRO GROUP HEADER ── */
.metro-group{max-width:1200px;margin:0 auto;padding:0 2rem 2rem}
.metro-group-title{
  display:flex;align-items:center;gap:10px;
  margin:2rem 0 1rem;
  padding-bottom:10px;
  border-bottom:2px solid var(--border);
}
.metro-line-dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--red);flex-shrink:0;
}
.metro-group-title h2{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:600;color:var(--ink);
}
.metro-group-title span{
  font-size:13px;color:var(--muted);margin-left:auto;font-weight:400;
}

/* ── CARDS ── */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
  box-shadow:var(--shadow);
}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}

.card-img-wrap{position:relative;height:175px;background:var(--surface);overflow:hidden}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s}
.card:hover .card-img-wrap img{transform:scale(1.04)}
.card-img-placeholder{
  width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:52px;
  background:linear-gradient(135deg,var(--surface) 0%,#E8E4DE 100%);
}
.cat-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(26,26,26,0.7);backdrop-filter:blur(4px);
  color:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;
  padding:3px 10px;border-radius:12px;font-weight:500;
}
.free-badge{
  position:absolute;top:10px;right:10px;
  background:#1B5E20;color:#fff;
  font-size:10px;padding:3px 10px;border-radius:12px;font-weight:500;
}

.card-body{padding:14px 16px}
.card-name{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:600;color:var(--ink);margin-bottom:2px;
}
.card-name-zh{font-size:12px;color:var(--hint);margin-bottom:12px}

.meta-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.meta-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--muted)}
.meta-icon{width:15px;height:15px;stroke:var(--red);flex-shrink:0;margin-top:1px}
.meta-row span{flex:1;line-height:1.5}

.nearby-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.nearby-tag{
  font-size:11px;padding:2px 8px;border-radius:10px;
  background:var(--surface);color:var(--muted);border:1px solid var(--border);
}

.card-desc{
  font-size:13px;color:var(--muted);line-height:1.6;
  margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);padding-top:12px;gap:8px;
}
.price-tag{
  font-size:13px;font-weight:500;
  background:var(--red-light);color:var(--red);
  padding:4px 10px;border-radius:8px;
}
.price-tag.free{background:#E8F5E9;color:#2E7D32}

.map-link{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:var(--red);
  border:1px solid var(--red);
  padding:5px 12px;border-radius:var(--radius-sm);
  text-decoration:none;font-weight:500;
  transition:all 0.15s;white-space:nowrap;
}
.map-link:hover{background:var(--red);color:#fff}
.map-link svg{width:13px;height:13px;stroke:currentColor}

/* ── EMPTY / LOADING ── */
.state-box{
  grid-column:1/-1;text-align:center;
  padding:4rem 1rem;color:var(--hint);
}
.state-box svg{width:40px;height:40px;stroke:var(--border);display:block;margin:0 auto 12px}
.state-box p{font-size:14px}

/* ── FOOTER ── */
footer{
  text-align:center;padding:2rem;
  font-size:12px;color:var(--hint);
  border-top:1px solid var(--border);margin-top:3rem;
}

/* ── FLAT LIST MODE ── */
.flat-wrap{max-width:1200px;margin:0 auto;padding:0 2rem 2rem}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">Taiwan Travel Guide</div>
    <h1>Discover <span>Taiwan</span></h1>
    <p>Curated destinations — temples, nature, night markets & more</p>
  </div>
</header>

<div class="controls-wrap">
  <div class="controls-row">
    <div class="search-wrap">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search places, stations, districts…" oninput="render()" />
    </div>
    <div class="filter-chips">
      <button class="chip active" data-cat="all" onclick="setFilter('all')">All</button>
      <button class="chip" data-cat="nature" onclick="setFilter('nature')">🌿 Nature</button>
      <button class="chip" data-cat="culture" onclick="setFilter('culture')">⛩️ Culture</button>
      <button class="chip" data-cat="food" onclick="setFilter('food')">🍢 Food & Market</button>
      <button class="chip" data-cat="historic" onclick="setFilter('historic')">🏛️ Historic</button>
    </div>
  </div>
</div>

<div class="sort-bar">
  <span class="sort-label">Group by</span>
  <button class="sort-btn active" id="sort-metro" onclick="setSort('metro')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Metro Station
  </button>
  <button class="sort-btn" id="sort-name" onclick="setSort('name')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h8"/></svg>
    Name (A–Z)
  </button>
  <button class="sort-btn" id="sort-district" onclick="setSort('district')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
    District
  </button>
  <span class="results-info" id="resultsInfo"></span>
</div>

<div id="mainContent"></div>

<footer>
  © Taiwan Travel Guide · Data managed by admin team · <a href="admin.html" style="color:var(--hint)">Admin</a>
</footer>

<!-- Firebase SDKs -->
<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

let allPlaces = [];
let currentFilter = 'all';
let currentSort   = 'metro';

window.setFilter = function(cat) {
  currentFilter = cat;
  document.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
};

window.setSort = function(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.id === 'sort-' + s));
  render();
};

window.render = function() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = allPlaces.filter(p => {
    const matchCat = currentFilter === 'all' || p.category === currentFilter;
    const matchQ   = !q || [p.name, p.nameZh, p.district, p.metroStation, p.desc]
      .some(f => f && f.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById('resultsInfo').textContent =
    list.length + ' place' + (list.length !== 1 ? 's' : '') + ' found';

  const wrap = document.getElementById('mainContent');

  if (list.length === 0) {
    wrap.innerHTML = `<div class="flat-wrap"><div class="cards-grid"><div class="state-box">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No places found. Try a different keyword or filter.</p></div></div></div>`;
    return;
  }

  if (currentSort === 'metro') {
    renderGrouped(list, 'metroStation', wrap);
  } else if (currentSort === 'district') {
    renderGrouped(list, 'district', wrap);
  } else {
    list.sort((a,b) => a.name.localeCompare(b.name));
    wrap.innerHTML = `<div class="flat-wrap"><div class="cards-grid">${list.map(cardHTML).join('')}</div></div>`;
  }
};

function renderGrouped(list, key, wrap) {
  const groups = {};
  list.forEach(p => {
    const k = p[key] || 'Other';
    if (!groups[k]) groups[k] = [];
    groups[k].push(p);
  });
  const sorted = Object.keys(groups).sort();
  wrap.innerHTML = sorted.map(g => `
    <div class="metro-group">
      <div class="metro-group-title">
        <div class="metro-line-dot"></div>
        <h2>${g}</h2>
        <span>${groups[g].length} place${groups[g].length !== 1 ? 's' : ''}</span>
      </div>
      <div class="cards-grid">${groups[g].map(cardHTML).join('')}</div>
    </div>
  `).join('');
}

function cardHTML(p) {
  const imgEl = p.imageUrl
    ? `<img src="${esc(p.imageUrl)}" alt="${esc(p.name)}" loading="lazy" />`
    : `<div class="card-img-placeholder">${p.emoji || '📍'}</div>`;
  const nearbyHTML = (p.nearby || []).map(n => `<span class="nearby-tag">${esc(n)}</span>`).join('');
  const isFree = !p.price || p.price === 0;
  return `
  <div class="card">
    <div class="card-img-wrap">
      ${imgEl}
      <span class="cat-badge">${esc(p.category || '')}</span>
      ${isFree ? '<span class="free-badge">Free</span>' : ''}
    </div>
    <div class="card-body">
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-name-zh">${esc(p.nameZh || '')} · ${esc(p.district || '')}</div>
      <div class="meta-list">
        <div class="meta-row">
          <svg class="meta-icon" fill="none" viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10v4M10 10v4M14 10v4M18 10v4"/></svg>
          <span><strong>${esc(p.metroStation || 'N/A')}</strong> — ${esc(p.metroAccess || '')}</span>
        </div>
        <div class="meta-row">
          <svg class="meta-icon" fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          <div><div style="margin-bottom:4px">Nearby areas</div><div class="nearby-wrap">${nearbyHTML}</div></div>
        </div>
      </div>
      <div class="card-desc">${esc(p.desc || '')}</div>
      <div class="card-footer">
        <span class="price-tag ${isFree ? 'free' : ''}">${isFree ? 'Free entry' : 'NT$' + p.price}</span>
        ${p.mapUrl ? `<a href="${esc(p.mapUrl)}" target="_blank" rel="noopener" class="map-link">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          Google Maps</a>` : ''}
      </div>
    </div>
  </div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Load data from Firebase
const placesRef = ref(db, 'places');
onValue(placesRef, snap => {
  const data = snap.val();
  allPlaces = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
  render();
}, err => {
  document.getElementById('mainContent').innerHTML =
    `<div class="flat-wrap"><div class="state-box"><p style="color:#B5311A">Unable to load data. Check Firebase config.<br><small>${err.message}</small></p></div></div>`;
});
</script>
</body>
</html>
